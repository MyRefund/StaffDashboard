<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tax Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border: 1px solid #ddd;
    }

    h1 {
      margin: 0 0 16px 0;
      font-size: 24px;
      font-weight: 700;
    }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .topbar label {
      font-weight: 700;
    }

    .topbar input {
      padding: 8px 10px;
      border: 1px solid #bbb;
      min-width: 220px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    button {
      padding: 9px 14px;
      border: 1px solid #999;
      background: #f3f3f3;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #e9e9e9;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1200px;
    }

    th, td {
      border: 1px solid #d6d6d6;
      padding: 8px;
      text-align: center;
      font-size: 14px;
    }

    th {
      background: #f1f1f1;
      font-weight: 700;
    }

    td.year-cell {
      font-weight: 700;
      background: #fafafa;
    }

    input.cell-input {
      width: 100%;
      border: none;
      outline: none;
      text-align: center;
      padding: 6px 4px;
      background: transparent;
      font-size: 14px;
    }

    .calc-output {
      font-weight: 700;
      background: #fafafa;
      min-width: 90px;
    }

    .footer-note {
      margin-top: 14px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Tax Calculator</h1>

    <div class="topbar">
      <label for="irdNumber">IRD #</label>
      <input type="text" id="irdNumber" placeholder="Enter IRD Number" />

      <div class="actions">
        <button type="button" onclick="downloadResult()">Download Result</button>
        <button type="button" onclick="resetAll()">Reset</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>YEAR</th>
            <th>GROSS</th>
            <th>TAX</th>
            <th>WHT G/INT</th>
            <th>RWT</th>
            <th>IMP CR</th>
            <th>PIE</th>
            <th>PIR</th>
            <th>Y RATE</th>
            <th>IETC</th>
            <th>M EXP</th>
            <th>A EXP</th>
            <th>MYR CALC</th>
          </tr>
        </thead>
        <tbody id="calcBody"></tbody>
      </table>
    </div>

    <div class="footer-note">
      Figures calculate automatically as values are entered.
    </div>
  </div>

  <script>
    const years = [2026, 2025, 2024, 2023, 2022, 2021, 2020];

    const yearConfigs = {
      2026: {
        brackets: [
          { max: 15600, rate: 0.105, baseAt: 0 },
          { max: 53500, rate: 0.175, baseAt: 15600 },
          { max: 78100, rate: 0.30, baseAt: 53500 },
          { max: 180000, rate: 0.33, baseAt: 78100 },
          { max: Infinity, rate: 0.39, baseAt: 180000 }
        ],
        ietcThresholdLow: 24000,
        ietcThresholdHigh: 70000,
        ietcBaseLimit: 66000,
        ietcMonthlyFactor: 43.333333,
        ietcReductionRate: 0.13
      },
      2025: {
        brackets: [
          { max: 14000, rate: 0.105, baseAt: 0 },
          { max: 15600, rate: 0.1282, baseAt: 14000 },
          { max: 48000, rate: 0.175, baseAt: 15600 },
          { max: 53500, rate: 0.2164, baseAt: 48000 },
          { max: 70000, rate: 0.30, baseAt: 53500 },
          { max: 78100, rate: 0.3099, baseAt: 70000 },
          { max: 180000, rate: 0.33, baseAt: 78100 },
          { max: Infinity, rate: 0.39, baseAt: 180000 }
        ],
        ietcThresholdLow: 24000,
        ietcThresholdHigh: 70000,
        ietcBaseLimit: 66000,
        ietcMonthlyFactor: 43.333333,
        ietcReductionRate: 0.13
      },
      2024: {
        brackets: [
          { max: 14000, rate: 0.105, baseAt: 0 },
          { max: 48000, rate: 0.175, baseAt: 14000 },
          { max: 70000, rate: 0.30, baseAt: 48000 },
          { max: 180000, rate: 0.33, baseAt: 70000 },
          { max: Infinity, rate: 0.39, baseAt: 180000 }
        ],
        ietcThresholdLow: 24000,
        ietcThresholdHigh: 48000,
        ietcBaseLimit: 44000,
        ietcMonthlyFactor: 43.333333,
        ietcReductionRate: 0.13
      },
      2023: {
        brackets: [
          { max: 14000, rate: 0.105, baseAt: 0 },
          { max: 48000, rate: 0.175, baseAt: 14000 },
          { max: 70000, rate: 0.30, baseAt: 48000 },
          { max: 180000, rate: 0.33, baseAt: 70000 },
          { max: Infinity, rate: 0.39, baseAt: 180000 }
        ],
        ietcThresholdLow: 24000,
        ietcThresholdHigh: 48000,
        ietcBaseLimit: 44000,
        ietcMonthlyFactor: 43.333333,
        ietcReductionRate: 0.13
      },
      2022: {
        brackets: [
          { max: 14000, rate: 0.105, baseAt: 0 },
          { max: 48000, rate: 0.175, baseAt: 14000 },
          { max: 70000, rate: 0.30, baseAt: 48000 },
          { max: 180000, rate: 0.33, baseAt: 70000 },
          { max: Infinity, rate: 0.39, baseAt: 180000 }
        ],
        ietcThresholdLow: 24000,
        ietcThresholdHigh: 48000,
        ietcBaseLimit: 44000,
        ietcMonthlyFactor: 43.333333,
        ietcReductionRate: 0.13
      },
      2021: {
        brackets: [
          { max: 14000, rate: 0.105, baseAt: 0 },
          { max: 48000, rate: 0.175, baseAt: 14000 },
          { max: 70000, rate: 0.30, baseAt: 48000 },
          { max: Infinity, rate: 0.33, baseAt: 70000 }
        ],
        ietcThresholdLow: 24000,
        ietcThresholdHigh: 48000,
        ietcBaseLimit: 44000,
        ietcMonthlyFactor: 43.333333,
        ietcReductionRate: 0.13
      },
      2020: {
        brackets: [
          { max: 14000, rate: 0.105, baseAt: 0 },
          { max: 48000, rate: 0.175, baseAt: 14000 },
          { max: 70000, rate: 0.30, baseAt: 48000 },
          { max: Infinity, rate: 0.33, baseAt: 70000 }
        ],
        ietcThresholdLow: 24000,
        ietcThresholdHigh: 48000,
        ietcBaseLimit: 44000,
        ietcMonthlyFactor: 43.333333,
        ietcReductionRate: 0.13
      }
    };

    function buildTable() {
      const body = document.getElementById("calcBody");
      body.innerHTML = "";

      years.forEach(year => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="year-cell">${year}</td>
          <td><input class="cell-input" type="number" step="0.01" id="gross-${year}" value="0"></td>
          <td><input class="cell-input" type="number" step="0.01" id="tax-${year}" value="0"></td>
          <td><input class="cell-input" type="number" step="0.01" id="wht-${year}" value="0"></td>
          <td><input class="cell-input" type="number" step="0.01" id="rwt-${year}" value="0"></td>
          <td><input class="cell-input" type="number" step="0.01" id="imp-${year}" value="0"></td>
          <td><input class="cell-input" type="number" step="0.01" id="pie-${year}" value="0"></td>
          <td><input class="cell-input" type="number" step="0.0001" id="pir-${year}" value="0"></td>
          <td><input class="cell-input" type="number" step="0.0001" id="yrate-${year}" value="0"></td>
          <td><input class="cell-input" type="number" step="1" min="0" max="12" id="ietc-${year}" value="0"></td>
          <td><input class="cell-input" type="number" step="0.01" id="mexp-${year}" value="0"></td>
          <td><input class="cell-input" type="number" step="0.01" id="aexp-${year}" value="0"></td>
          <td class="calc-output" id="calc-${year}">0.00</td>
        `;
        body.appendChild(tr);
      });

      document.querySelectorAll(".cell-input").forEach(input => {
        input.addEventListener("input", calculateAll);
        input.addEventListener("change", calculateAll);
      });
    }

    function num(id) {
      return Number(document.getElementById(id).value || 0);
    }

    function roundDown2(value) {
      return Math.floor((Number(value) || 0) * 100) / 100;
    }

    function calculateIetc(taxableIncome, ietcMonths, config) {
      if (!config || ietcMonths <= 0) return 0;

      const monthlyFactor = config.ietcMonthlyFactor;
      const baseLimit = config.ietcBaseLimit;
      const reductionRate = config.ietcReductionRate;

      let provisional;
      if (taxableIncome > baseLimit) {
        provisional = taxableIncome - baseLimit;
      } else {
        provisional = ietcMonths * monthlyFactor;
      }

      let adjusted;
      if (taxableIncome < baseLimit) {
        adjusted = provisional;
      } else {
        adjusted = (ietcMonths * monthlyFactor) - ((provisional / 12) * reductionRate) * ietcMonths;
      }

      const qualifies =
        taxableIncome > config.ietcThresholdLow &&
        taxableIncome < config.ietcThresholdHigh;

      if (!qualifies) return 0;
      return adjusted > 0 ? adjusted : 0;
    }

    function calculatePieDebtCredit(pieIncome, pir, yRate) {
      return (pieIncome * yRate) - (pieIncome * pir);
    }

    function calculateTax(taxableIncome, config) {
      if (!config) return 0;

      let totalTax = 0;

      config.brackets.forEach(bracket => {
        if (taxableIncome <= bracket.baseAt) return;

        let amountInBracket = 0;

        if (bracket.max === Infinity) {
          amountInBracket = taxableIncome - bracket.baseAt;
        } else {
          amountInBracket = Math.min(taxableIncome, bracket.max) - bracket.baseAt;
        }

        if (amountInBracket > 0) {
          totalTax += amountInBracket * bracket.rate;
        }
      });

      return roundDown2(totalTax);
    }

    function calculateRow(year) {
      const gross = num(`gross-${year}`);
      const tax = num(`tax-${year}`);
      const wht = num(`wht-${year}`);
      const rwt = num(`rwt-${year}`);
      const imp = num(`imp-${year}`);
      const pie = num(`pie-${year}`);
      const pir = num(`pir-${year}`);
      const yRate = num(`yrate-${year}`);
      const ietcMonths = num(`ietc-${year}`);
      const mExp = num(`mexp-${year}`);
      const aExp = num(`aexp-${year}`);

      const config = yearConfigs[year];

      const totalExpenses = mExp + aExp;
      const taxableIncome = Math.floor(gross + wht - totalExpenses);
      const taxPaid = tax + rwt;
      const pieDebtCredit = roundDown2(calculatePieDebtCredit(pie, pir, yRate));
      const ietcAmount = roundDown2(calculateIetc(taxableIncome, ietcMonths, config));
      let taxRequired = calculateTax(taxableIncome, config) - imp;

      if (pieDebtCredit < 0) {
        taxRequired += Math.abs(pieDebtCredit);
      }

      taxRequired = roundDown2(taxRequired);

      let result;
      if (pieDebtCredit > 0) {
        result = roundDown2((taxPaid - taxRequired) + ietcAmount + pieDebtCredit);
      } else {
        result = roundDown2((taxPaid - taxRequired) + ietcAmount);
      }

      document.getElementById(`calc-${year}`).textContent = result.toFixed(2);
    }

    function calculateAll() {
      years.forEach(calculateRow);
    }

    function resetAll() {
      document.getElementById("irdNumber").value = "";
      document.querySelectorAll(".cell-input").forEach(input => {
        input.value = 0;
      });
      calculateAll();
    }

    function downloadResult() {
      const ird = document.getElementById("irdNumber").value || "";
      let lines = [];
      lines.push(["IRD #", ird].join(","));
      lines.push("");
      lines.push(["YEAR","GROSS","TAX","WHT G/INT","RWT","IMP CR","PIE","PIR","Y RATE","IETC","M EXP","A EXP","MYR CALC"].join(","));

      years.forEach(year => {
        lines.push([
          year,
          num(`gross-${year}`),
          num(`tax-${year}`),
          num(`wht-${year}`),
          num(`rwt-${year}`),
          num(`imp-${year}`),
          num(`pie-${year}`),
          num(`pir-${year}`),
          num(`yrate-${year}`),
          num(`ietc-${year}`),
          num(`mexp-${year}`),
          num(`aexp-${year}`),
          document.getElementById(`calc-${year}`).textContent
        ].join(","));
      });

      const blob = new Blob([lines.join("\n")], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `tax-calculator-${ird || "no-ird"}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    buildTable();
    calculateAll();
  </script>
</body>
</html>
