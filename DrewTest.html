<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Language" content="en">
<meta name="google" content="notranslate">
<title>My Refund — Processing Workspace</title>

<style>
:root{
  --g0:#094B35;
  --g2:#ECFDF5;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --radius:16px;
  --shadow:0 12px 32px rgba(0,0,0,.14);
}
*{box-sizing:border-box}
body{margin:0;font-family:"Okta Neue",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);}
.page{min-height:100vh;background:url("My Refund-Hero Images-02 (1).jpg") center/cover no-repeat;transition:.2s ease;}
.page.submitting{opacity:.7;}

.header{background:var(--g0);color:#fff;padding:14px 24px;}
.header-inner{max-width:1300px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;}
.brand{display:flex;align-items:center;gap:14px;}
.brand img{height:26px}
.brand-text strong{font-size:15px;font-weight:900}
.brand-text span{font-size:12px;opacity:.9;font-weight:700}
.header-right{display:flex;align-items:center;gap:12px;}

.dashboard-btn{
  border-radius:999px;
  padding:8px 16px;
  font-weight:900;
  font-size:13px;
  border:1px solid #fff;
  background:transparent;
  color:#fff;
  cursor:pointer;
}

.clock{font-weight:900;font-size:14px}

.top-action{
  border-radius:999px;
  padding:8px 14px;
  font-weight:900;
  font-size:13px;
  border:1px solid #fff;
  background:#fff;
  color:var(--g0);
  cursor:pointer;
}

/* NEW BUTTON */
.calculator-btn{
  border-radius:999px;
  padding:8px 14px;
  font-weight:900;
  font-size:13px;
  border:1px solid #fff;
  background:transparent;
  color:#fff;
  cursor:pointer;
}

/* DRAWERS */
.calculator-drawer{
  position:fixed;
  top:0;
  right:-100%;
  width:520px;
  height:100%;
  background:#fff;
  box-shadow:-10px 0 40px rgba(0,0,0,.2);
  z-index:9999;
  display:flex;
  flex-direction:column;
  transition:right 0.35s ease;
}
.calculator-drawer.open{right:0;}

.drawer-header{
  background:#094B35;
  color:#fff;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:900;
}
.drawer-iframe{width:100%;height:100%;border:none;}

.drawer-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.3);
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:9998;
}
.drawer-overlay.show{
  opacity:1;
  pointer-events:auto;
}

/* ORIGINAL STYLES */
.tabs{background:#fff;padding:12px 24px;display:flex;gap:10px;border-bottom:1px solid var(--border);}
.tab{border-radius:999px;padding:8px 16px;font-weight:900;font-size:13px;border:1px solid var(--g0);background:#fff;color:var(--g0);cursor:pointer;}
.tab.active{background:var(--g0);color:#fff;}
.wrap{max-width:1300px;margin:0 auto;padding:36px 24px 60px;}
.layout{display:grid;grid-template-columns:1fr 260px;gap:24px;}
.panel{background:rgba(255,255,255,.96);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:20px;}
.panel h3{margin:0 0 14px 0;font-size:18px;font-weight:900;color:var(--g0);}
</style>
</head>

<body>
<div class="page">

<div class="header">
<div class="header-inner">
<div class="brand">
<img src="logo.png">
<div class="brand-text">
<strong id="staffNameLabel">Processing</strong>
<span>Daily Work Logger</span>
</div>
</div>

<div class="header-right">
<button class="calculator-btn" onclick="toggleCalculator()">Calculator</button>

<button class="top-action" onclick="updateDay()">Update</button>
<button class="dashboard-btn" onclick="goHome()">← Dashboard</button>
<div class="clock" id="clock"></div>
</div>
</div>
</div>

<div class="tabs">
<button class="tab active" onclick="switchTab('work',this)">Work Log</button>
<button class="tab" onclick="switchTab('resources',this)">Resources</button>
</div>

<div class="wrap">

<div id="workTab">
  <!-- WORK TAB CONTENT CONTINUES -->

<div style="margin-bottom:28px;">
  <div style="font-size:24px;font-weight:900;color:#094B35;">
    Hello, <span id="helloName"></span>
  </div>
  <div style="margin-top:6px;font-size:13px;font-weight:800;color:#6b7280;">
    <span id="todayDate"></span> • Division: Processing
  </div>
</div>

<div class="layout">
  <div class="panel">
    <h3>Processing Output</h3>
    <div class="grid">
      <div class="item"><label>Filing</label><div class="controls"><button onclick="adj('filing',-1)">−</button><input id="filing" value="0"><button onclick="adj('filing',1)">+</button></div></div>
      <div class="item"><label>Linking</label><div class="controls"><button onclick="adj('linking',-1)">−</button><input id="linking" value="0"><button onclick="adj('linking',1)">+</button></div></div>
      <div class="item"><label>Linked Review</label><div class="controls"><button onclick="adj('linkedreview',-1)">−</button><input id="linkedreview" value="0"><button onclick="adj('linkedreview',1)">+</button></div></div>
      <div class="item"><label>Inbox</label><div class="controls"><button onclick="adj('inbox',-1)">−</button><input id="inbox" value="0"><button onclick="adj('inbox',1)">+</button></div></div>
      <div class="item"><label>Existing Review</label><div class="controls"><button onclick="adj('existingreview',-1)">−</button><input id="existingreview" value="0"><button onclick="adj('existingreview',1)">+</button></div></div>
      <div class="item"><label>Processing Review</label><div class="controls"><button onclick="adj('processingreview',-1)">−</button><input id="processingreview" value="0"><button onclick="adj('processingreview',1)">+</button></div></div>
      <div class="item"><label>Miscellaneous</label><div class="controls"><button onclick="adj('misc',-1)">−</button><input id="misc" value="0"><button onclick="adj('misc',1)">+</button></div></div>
    </div>
  </div>
</div>

</div> <!-- END WORK TAB -->

<!-- ✅ RESOURCES TAB (EXPENSE LOOKUP FULL PAGE) -->
<div id="resourcesTab" class="hidden">

  <div class="panel" style="padding:0;overflow:hidden;">
    
    <div style="
      background:#094B35;
      color:#fff;
      padding:12px 16px;
      font-weight:900;
      border-radius:16px 16px 0 0;
    ">
      Expense Lookup
    </div>

    <iframe 
      src="expense-lookup.html"
      style="width:100%;height:80vh;border:none;">
    </iframe>

  </div>

</div>

</div> <!-- wrap -->
</div> <!-- page -->

<!-- CALCULATOR DRAWER -->
<div id="calculatorDrawer" class="calculator-drawer">
  <div class="drawer-header">
    <strong>Fee Calculator</strong>
    <button onclick="toggleCalculator()">✕</button>
  </div>
  <iframe src="feecalc.html" class="drawer-iframe"></iframe>
</div>

<div id="drawerOverlay" class="drawer-overlay" onclick="closeAllDrawers()"></div>

<script>
document.addEventListener("DOMContentLoaded",function(){

const TZ="Pacific/Auckland";
const name=localStorage.getItem("currentStaff")||"Processing";

/* ✅ NZ DATE FIX */
function getNZDateParts(offsetDays = 0){
  const now = new Date();
  const nz = new Date(now.toLocaleString("en-US",{timeZone:TZ}));
  nz.setDate(nz.getDate() + offsetDays);

  const y = nz.getFullYear();
  const m = String(nz.getMonth()+1).padStart(2,"0");
  const d = String(nz.getDate()).padStart(2,"0");

  return `${y}-${m}-${d}`;
}

function nzHuman(iso){
  const[a,b,c]=iso.split("-").map(Number);
  return new Date(Date.UTC(a,b-1,c,12)).toLocaleDateString("en-NZ",{
    weekday:"long",
    day:"numeric",
    month:"long",
    year:"numeric",
    timeZone:TZ
  });
}

const todayISO = getNZDateParts(0);

document.getElementById("staffNameLabel").textContent=name;
document.getElementById("helloName").textContent=name;
document.getElementById("todayDate").textContent = nzHuman(todayISO);

/* BASIC CLOCK */
function tick(){
  document.getElementById("clock").textContent =
    new Date().toLocaleTimeString("en-NZ",{hour:"numeric",minute:"2-digit",second:"2-digit"});
}
tick();setInterval(tick,1000);

});

/* TAB SWITCH */
function switchTab(tab, el){
  document.getElementById("workTab").classList.add("hidden");
  document.getElementById("resourcesTab").classList.add("hidden");

  document.getElementById(tab+"Tab").classList.remove("hidden");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
}

/* DRAWERS */
function closeAllDrawers(){
  document.getElementById("calculatorDrawer").classList.remove("open");
  document.getElementById("drawerOverlay").classList.remove("show");
}

function toggleCalculator(){
  const d=document.getElementById("calculatorDrawer");
  const o=document.getElementById("drawerOverlay");
  const open=d.classList.contains("open");
  closeAllDrawers();
  if(!open){d.classList.add("open");o.classList.add("show");}
}
</script>

</body>
</html>
