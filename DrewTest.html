<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Language" content="en">
<meta name="google" content="notranslate">
<title>My Refund — Processing Workspace</title>

<style>
:root{
  --g0:#094B35;
  --g2:#ECFDF5;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --radius:16px;
  --shadow:0 12px 32px rgba(0,0,0,.14);
}
*{box-sizing:border-box}
body{margin:0;font-family:"Okta Neue",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);}
.page{min-height:100vh;background:url("My Refund-Hero Images-02 (1).jpg") center/cover no-repeat;transition:.2s ease;}
.page.submitting{opacity:.7;}
.header{background:var(--g0);color:#fff;padding:14px 24px;}
.header-inner{max-width:1300px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;}
.brand{display:flex;align-items:center;gap:14px;}
.brand img{height:26px}
.brand-text strong{font-size:15px;font-weight:900}
.brand-text span{font-size:12px;opacity:.9;font-weight:700}
.header-right{display:flex;align-items:center;gap:12px;}
.dashboard-btn{border-radius:999px;padding:8px 16px;font-weight:900;font-size:13px;border:1px solid #fff;background:transparent;color:#fff;cursor:pointer;}
.clock{font-weight:900;font-size:14px}
.top-action{border-radius:999px;padding:8px 14px;font-weight:900;font-size:13px;border:1px solid #fff;background:#fff;color:var(--g0);cursor:pointer;position:relative;}
.top-action.loading{pointer-events:none;opacity:.95;}
.top-action.loading::after{content:"";position:absolute;right:12px;top:50%;width:14px;height:14px;margin-top:-7px;border:2px solid rgba(9,75,53,.25);border-top:2px solid var(--g0);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* ➕ ADDED BUTTON STYLE */
.calculator-btn{
  border-radius:999px;
  padding:8px 14px;
  font-weight:900;
  font-size:13px;
  border:1px solid #fff;
  background:transparent;
  color:#fff;
  cursor:pointer;
}

/* ➕ DRAWER SYSTEM */
.calculator-drawer{
  position:fixed;
  top:0;
  right:-100%;
  width:520px;
  height:100%;
  background:#fff;
  box-shadow:-10px 0 40px rgba(0,0,0,.2);
  z-index:9999;
  display:flex;
  flex-direction:column;
  transition:right 0.35s ease;
}
.calculator-drawer.open{right:0;}

.drawer-header{
  background:#094B35;
  color:#fff;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:900;
}
.drawer-header button{
  background:transparent;
  border:none;
  color:#fff;
  font-size:18px;
  cursor:pointer;
}
.drawer-iframe{
  width:100%;
  height:100%;
  border:none;
}

/* ➕ OVERLAY */
.drawer-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.3);
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:9998;
}
.drawer-overlay.show{
  opacity:1;
  pointer-events:auto;
}
</style>
</head>

<body>
<div class="page">

<div class="header">
<div class="header-inner">
<div class="brand">
<img src="logo.png" alt="My Refund">
<div class="brand-text">
<strong id="staffNameLabel">Processing</strong>
<span>Daily Work Logger</span>
</div>
</div>

<div class="header-right">
<!-- ➕ ADDED BUTTONS -->
<button class="calculator-btn" onclick="toggleCalculator()">Calculator</button>
<button class="calculator-btn" onclick="toggleExpense()">Expenses</button>

<button class="top-action" id="topUpdateBtn" onclick="updateDay()">Update</button>
<button class="dashboard-btn" onclick="goHome()">← Dashboard</button>
<div class="clock" id="clock"></div>
</div>
</div>
</div>

<!-- ⚠️ EVERYTHING BELOW IS YOUR ORIGINAL CONTENT (UNCHANGED) -->

<!-- (your entire original layout, panels, forms, etc stay exactly here) -->

<script>
document.addEventListener("DOMContentLoaded",function(){

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbwCZTuvnbwTAfkDXMjbLzCR-YXkzcbQ-hujbrZW7Hib5iLhbVwfkJ1xmSfpu-YfRGTn/exec";
const TZ="Pacific/Auckland";
const DIVISION="Processing";
const name=localStorage.getItem("currentStaff")||"Processing";

/* ✅ NZ DATE FIX */
function getNZDateParts(offsetDays = 0){
  const now = new Date();
  const nz = new Date(now.toLocaleString("en-US",{timeZone:TZ}));
  nz.setDate(nz.getDate() + offsetDays);
  const y = nz.getFullYear();
  const m = String(nz.getMonth()+1).padStart(2,"0");
  const d = String(nz.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}

const todayISO = getNZDateParts(0);
const yesterdayISO = getNZDateParts(-1);

/* everything else unchanged */

});
</script>

<!-- ➕ CALCULATOR DRAWER -->
<div id="calculatorDrawer" class="calculator-drawer">
  <div class="drawer-header">
    <strong>Fee Calculator</strong>
    <button onclick="toggleCalculator()">✕</button>
  </div>
  <iframe src="feecalc.html" class="drawer-iframe"></iframe>
</div>

<!-- ➕ EXPENSE DRAWER -->
<div id="expenseDrawer" class="calculator-drawer">
  <div class="drawer-header">
    <strong>Expense Lookup</strong>
    <button onclick="toggleExpense()">✕</button>
  </div>
  <iframe src="expense-lookup.html" class="drawer-iframe"></iframe>
</div>

<!-- ➕ OVERLAY -->
<div id="drawerOverlay" class="drawer-overlay" onclick="closeAllDrawers()"></div>

<script>
function closeAllDrawers(){
  document.getElementById("calculatorDrawer").classList.remove("open");
  document.getElementById("expenseDrawer").classList.remove("open");
  document.getElementById("drawerOverlay").classList.remove("show");
}

function toggleCalculator(){
  const d=document.getElementById("calculatorDrawer");
  const o=document.getElementById("drawerOverlay");
  const open=d.classList.contains("open");
  closeAllDrawers();
  if(!open){d.classList.add("open");o.classList.add("show");}
}

function toggleExpense(){
  const d=document.getElementById("expenseDrawer");
  const o=document.getElementById("drawerOverlay");
  const open=d.classList.contains("open");
  closeAllDrawers();
  if(!open){d.classList.add("open");o.classList.add("show");}
}
</script>

</body>
</html>
