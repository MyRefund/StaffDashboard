<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>My Refund — CSR Workspace</title>

<style>
:root{
  --g0:#094B35;
  --g2:#ECFDF5;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --radius:16px;
  --shadow:0 12px 32px rgba(0,0,0,.14);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Okta Neue", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color:var(--text);
}
.page{
  min-height:100vh;
  background:url("My Refund-Hero Images-02 (1).jpg") center / cover no-repeat;
}

/* HEADER */
.header{
  background:var(--g0);
  color:#fff;
  padding:14px 24px;
}
.header-inner{
  max-width:1300px;
  margin:0 auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.brand{
  display:flex;
  align-items:center;
  gap:14px;
}
.brand img{height:26px}
.brand-text strong{font-size:15px;font-weight:900;}
.brand-text span{font-size:12px;opacity:.9;font-weight:700;}
.header-right{display:flex;align-items:center;gap:14px;}

/* NEW BUTTON */
.calculator-btn{
  border-radius:999px;
  padding:8px 14px;
  font-weight:900;
  font-size:13px;
  border:1px solid #fff;
  background:transparent;
  color:#fff;
  cursor:pointer;
}

.dashboard-btn{
  border-radius:999px;
  padding:8px 16px;
  font-weight:900;
  font-size:13px;
  border:1px solid #fff;
  background:transparent;
  color:#fff;
  cursor:pointer;
}
.clock{font-weight:900;font-size:14px}

/* CONTENT */
.wrap{max-width:1300px;margin:0 auto;padding:36px 24px 60px;}
.hello{font-size:24px;font-weight:900;color:var(--g0);}
.subline{margin-top:6px;font-weight:800;color:var(--muted);}

.layout{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:24px;
  margin-top:30px;
}

.panel{
  background:rgba(255,255,255,.96);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:20px;
  margin-bottom:20px;
}
.panel h3{
  margin:0 0 14px 0;
  font-size:16px;
  font-weight:900;
  color:var(--g0);
}

/* DRAWER */
.calculator-drawer{
  position:fixed;
  top:0;
  right:-100%;
  width:520px;
  height:100%;
  background:#fff;
  box-shadow:-10px 0 40px rgba(0,0,0,.2);
  z-index:9999;
  display:flex;
  flex-direction:column;
  transition:right 0.35s ease;
}
.calculator-drawer.open{
  right:0;
}

.drawer-header{
  background:#094B35;
  color:#fff;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:900;
}
.drawer-header button{
  background:transparent;
  border:none;
  color:#fff;
  font-size:18px;
  cursor:pointer;
}

.drawer-iframe{
  width:100%;
  height:100%;
  border:none;
}

/* OVERLAY */
.drawer-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.3);
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:9998;
}
.drawer-overlay.show{
  opacity:1;
  pointer-events:auto;
}

/* MOBILE */
@media(max-width:700px){
  .calculator-drawer{
    width:100%;
  }
}
</style>
</head>

<body>
<div class="page">

<div class="header">
  <div class="header-inner">
    <div class="brand">
      <img src="logo.png">
      <div class="brand-text">
        <strong>CSR</strong>
        <span>Daily Work Logger</span>
      </div>
    </div>

    <div class="header-right">
      <button class="calculator-btn" onclick="toggleCalculator()">Calculator</button>
      <button class="dashboard-btn">← Dashboard</button>
      <div class="clock" id="clock"></div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="hello">Hello</div>
  <div class="subline">CSR Workspace</div>

  <div class="layout">

    <div>
      <div class="panel">
        <h3>Inbound Calls</h3>
        <input value="0">
      </div>
    </div>

    <div>
      <div class="panel">
        <h3>Main Work Area</h3>
      </div>
    </div>

  </div>
</div>
</div>

<!-- DRAWER -->
<div id="calculatorDrawer" class="calculator-drawer">
  <div class="drawer-header">
    <strong>Tax Calculator</strong>
    <button onclick="toggleCalculator()">✕</button>
  </div>

  <iframe 
    src="tax-calculator-simple.html"
    class="drawer-iframe">
  </iframe>
</div>

<!-- OVERLAY -->
<div id="drawerOverlay" class="drawer-overlay" onclick="toggleCalculator()"></div>

<script>
function toggleCalculator(){
  const drawer = document.getElementById("calculatorDrawer");
  const overlay = document.getElementById("drawerOverlay");

  drawer.classList.toggle("open");
  overlay.classList.toggle("show");
}
</script>

</body>
</html>
