<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>My Refund — CSR Workspace</title>

<style>
:root{
  --g0:#094B35;
  --g2:#ECFDF5;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --radius:16px;
  --shadow:0 12px 32px rgba(0,0,0,.14);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Okta Neue", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color:var(--text);
}
.page{
  min-height:100vh;
  background:url("My Refund-Hero Images-02 (1).jpg") center / cover no-repeat;
  transition:.2s ease;
}
.page.submitting{opacity:.7}

/* HEADER */
.header{
  background:var(--g0);
  color:#fff;
  padding:14px 24px;
}
.header-inner{
  max-width:1300px;
  margin:0 auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.brand{
  display:flex;
  align-items:center;
  gap:14px;
}
.brand img{height:26px}
.brand-text strong{font-size:15px;font-weight:900;}
.brand-text span{font-size:12px;opacity:.9;font-weight:700;}
.header-right{display:flex;align-items:center;gap:14px;}
.dashboard-btn{
  border-radius:999px;
  padding:8px 16px;
  font-weight:900;
  font-size:13px;
  border:1px solid #fff;
  background:transparent;
  color:#fff;
  cursor:pointer;
}
.clock{font-weight:900;font-size:14px}

/* ✅ NEW: Calculator button */
.calculator-btn{
  border-radius:999px;
  padding:8px 14px;
  font-weight:900;
  font-size:13px;
  border:1px solid #fff;
  background:transparent;
  color:#fff;
  cursor:pointer;
}

/* RECOVERY BANNER */
.recovery-banner{
  background:#fff3cd;
  border-left:6px solid #f0ad4e;
  padding:14px 16px;
  margin:20px 0;
  border-radius:12px;
  font-weight:800;
}
.recovery-banner button{
  margin-top:10px;
  margin-right:10px;
  padding:8px 14px;
  border-radius:10px;
  border:none;
  font-weight:900;
  cursor:pointer;
}
.recovery-banner .continue{
  background:var(--g0);
  color:#fff;
}
.recovery-banner .fresh{
  background:#fff;
  border:1px solid var(--g0);
  color:var(--g0);
}

/* CONTENT */
.wrap{max-width:1300px;margin:0 auto;padding:36px 24px 60px;}
.hello{font-size:24px;font-weight:900;color:var(--g0);}
.subline{margin-top:6px;font-weight:800;color:var(--muted);}

.layout{
  display:grid;
  grid-template-columns:300px 1fr 260px;
  gap:24px;
  margin-top:30px;
}
.panel{
  background:rgba(255,255,255,.96);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:20px;
  margin-bottom:20px;
}
.panel h3{
  margin:0 0 14px 0;
  font-size:16px;
  font-weight:900;
  color:var(--g0);
}

/* COUNTERS */
.controls{display:flex;align-items:center;gap:6px;}
.controls button{
  width:32px;height:32px;
  border-radius:8px;
  border:1px solid var(--border);
  background:#fff;
  font-weight:900;
  cursor:pointer;
}
.controls input{
  width:60px;
  text-align:center;
  border:1px solid var(--border);
  border-radius:8px;
  padding:6px;
  font-weight:900;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
@media(max-width:900px){
  .grid{grid-template-columns:1fr}
}
.item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:12px 14px;
  border:1px solid var(--border);
  border-radius:14px;
  background:#fff;
}
.item label{
  font-weight:800;
  font-size:13px;
  color:var(--g0);
}

/* SUBMIT */
.submit button{
  width:100%;
  border-radius:14px;
  padding:14px;
  font-weight:900;
  font-size:15px;
  border:none;
  background:var(--g0);
  color:#fff;
  cursor:pointer;
  position:relative;
}
.submit button.loading{
  pointer-events:none;
  opacity:.9;
}
.submit button.loading::after{
  content:"";
  position:absolute;
  right:18px;
  top:50%;
  width:16px;
  height:16px;
  margin-top:-8px;
  border:2px solid rgba(255,255,255,.5);
  border-top:2px solid #fff;
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

/* ✅ NEW: Drawer */
.calculator-drawer{
  position:fixed;
  top:0;
  right:-100%;
  width:520px;
  height:100%;
  background:#fff;
  box-shadow:-10px 0 40px rgba(0,0,0,.2);
  z-index:9999;
  display:flex;
  flex-direction:column;
  transition:right 0.35s ease;
}
.calculator-drawer.open{
  right:0;
}

.drawer-header{
  background:#094B35;
  color:#fff;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:900;
}
.drawer-header button{
  background:transparent;
  border:none;
  color:#fff;
  font-size:18px;
  cursor:pointer;
}

.drawer-iframe{
  width:100%;
  height:100%;
  border:none;
}

/* ✅ NEW: Overlay */
.drawer-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.3);
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:9998;
}
.drawer-overlay.show{
  opacity:1;
  pointer-events:auto;
}

</style>
</head>

<body>
<div class="page">

<div class="header">
  <div class="header-inner">
    <div class="brand">
      <img src="logo.png">
      <div class="brand-text">
        <strong id="staffNameLabel">CSR</strong>
        <span>Daily Work Logger</span>
      </div>
    </div>
    <div class="header-right">
      <!-- ✅ ADDED BUTTON -->
      <button class="calculator-btn" onclick="toggleCalculator()">Calculator</button>

      <button class="dashboard-btn" onclick="goHome()">← Dashboard</button>
      <div class="clock" id="clock"></div>
    </div>
  </div>
</div>

<!-- EVERYTHING ELSE UNCHANGED -->
