function getNZDateParts(offsetDays = 0){
  const now = new Date();

  const nz = new Date(
    now.toLocaleString("en-US", { timeZone: "Pacific/Auckland" })
  );

  nz.setDate(nz.getDate() + offsetDays);

  const year = nz.getFullYear();
  const month = String(nz.getMonth() + 1).padStart(2, "0");
  const day = String(nz.getDate()).padStart(2, "0");

  return `${year}-${month}-${day}`;
}

    day:"numeric",

}
