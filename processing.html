<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Language" content="en">
<meta name="google" content="notranslate">
<title>My Refund — Processing Workspace</title>

<style>
:root{
  --g0:#094B35;
  --g2:#ECFDF5;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --radius:16px;
  --shadow:0 12px 32px rgba(0,0,0,.14);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Okta Neue", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color:var(--text);
}
.page{
  min-height:100vh;
  background:url("My Refund-Hero Images-02 (1).jpg") center / cover no-repeat;
  transition:.2s ease;
}
.page.submitting{ opacity:.7; }

/* HEADER */
.header{
  background:var(--g0);
  color:#fff;
  padding:14px 24px;
}
.header-inner{
  max-width:1300px;
  margin:0 auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.brand{
  display:flex;
  align-items:center;
  gap:14px;
}
.brand img{height:26px}
.brand-text strong{font-size:15px;font-weight:900}
.brand-text span{font-size:12px;opacity:.9;font-weight:700}
.header-right{
  display:flex;
  align-items:center;
  gap:12px;
}
.dashboard-btn{
  border-radius:999px;
  padding:8px 16px;
  font-weight:900;
  font-size:13px;
  border:1px solid #fff;
  background:transparent;
  color:#fff;
  cursor:pointer;
}
.clock{font-weight:900;font-size:14px}

/* RECOVERY BANNER */
.recovery-banner{
  background:#fff3cd;
  border-left:6px solid #f0ad4e;
  padding:14px 16px;
  margin-bottom:20px;
  border-radius:12px;
  font-weight:800;
}
.recovery-banner button{
  margin-top:10px;
  margin-right:10px;
  padding:8px 14px;
  border-radius:10px;
  border:none;
  font-weight:900;
  cursor:pointer;
}
.recovery-banner .continue{
  background:var(--g0);
  color:#fff;
}
.recovery-banner .fresh{
  background:#fff;
  border:1px solid var(--g0);
  color:var(--g0);
}

/* TOP ACTION BUTTONS */
.top-action{
  border-radius:999px;
  padding:8px 14px;
  font-weight:900;
  font-size:13px;
  border:1px solid #fff;
  background:#fff;
  color:var(--g0);
  cursor:pointer;
  position:relative;
}
.top-action.loading{
  pointer-events:none;
  opacity:.95;
}
.top-action.loading::after{
  content:"";
  position:absolute;
  right:12px;
  top:50%;
  width:14px;
  height:14px;
  margin-top:-7px;
  border:2px solid rgba(9,75,53,.25);
  border-top:2px solid var(--g0);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* TABS */
.tabs{
  background:#fff;
  padding:12px 24px;
  display:flex;
  gap:10px;
  border-bottom:1px solid var(--border);
}
.tab{
  border-radius:999px;
  padding:8px 16px;
  font-weight:900;
  font-size:13px;
  border:1px solid var(--g0);
  background:#fff;
  color:var(--g0);
  cursor:pointer;
}
.tab.active{background:var(--g0);color:#fff;}

.wrap{
  max-width:1300px;
  margin:0 auto;
  padding:36px 24px 60px;
}

.layout{
  display:grid;
  grid-template-columns:1fr 260px;
  gap:24px;
}
.panel{
  background:rgba(255,255,255,.96);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:20px;
  margin-bottom:20px;
}
.panel h3{
  margin:0 0 14px 0;
  font-size:18px;
  font-weight:900;
  color:var(--g0);
}
.fee-panel{border-top:6px solid var(--g0);}

.banner{
  background:#fff3cd;
  border-left:6px solid #f0ad4e;
  padding:12px 16px;
  margin-bottom:20px;
  font-weight:800;
  border-radius:12px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
}
.item{
  background:#fff;
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
}
.item label{
  display:block;
  font-weight:900;
  margin-bottom:8px;
}
.controls{
  display:flex;
  align-items:center;
  gap:6px;
}
.controls button{
  width:32px;height:32px;
  border-radius:8px;
  border:1px solid var(--border);
  background:#fff;
  font-weight:900;
  cursor:pointer;
}
.controls input{
  width:56px;
  text-align:center;
  border:1px solid var(--border);
  border-radius:8px;
  padding:6px;
  font-weight:900;
}

.button-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:12px;
  margin-bottom:16px;
}
.type-btn{
  border-radius:12px;
  padding:10px;
  font-weight:900;
  border:2px solid var(--g0);
  background:#fff;
  color:var(--g0);
  cursor:pointer;
}
.type-btn.active{background:var(--g0);color:#fff;}

input[type="text"]{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  font-weight:700;
  width:100%;
}

.add-btn{
  margin-top:10px;
  padding:10px 16px;
  border:none;
  border-radius:12px;
  background:var(--g0);
  color:#fff;
  font-weight:900;
  cursor:pointer;
}

table{width:100%;border-collapse:collapse;}
th,td{border-bottom:1px solid var(--border);padding:8px;font-size:13px;}
th{color:var(--muted);font-weight:900;text-align:left;}
td button{
  border:1px solid var(--border);
  background:#fff;
  border-radius:8px;
  padding:6px 8px;
  cursor:pointer;
  font-weight:900;
}

.total-box{
  background:var(--g2);
  border-radius:12px;
  padding:14px;
  font-weight:900;
  font-size:18px;
  text-align:right;
}

.submit button{
  width:100%;
  border-radius:14px;
  padding:14px;
  font-weight:900;
  font-size:15px;
  border:none;
  background:var(--g0);
  color:#fff;
  cursor:pointer;
  position:relative;
}
.submit button.loading{
  pointer-events:none;
  opacity:.95;
}
.submit button.loading::after{
  content:"";
  position:absolute;
  right:18px;
  top:50%;
  width:16px;
  height:16px;
  margin-top:-8px;
  border:2px solid rgba(255,255,255,.5);
  border-top:2px solid #fff;
  border-radius:50%;
  animation:spin .8s linear infinite;
}

.hidden{display:none;}
.inline-check{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:12px;
  background:#fff;
}
.inline-check span{
  font-weight:900;
  color:var(--muted);
  font-size:13px;
}
.helper{
  margin-top:10px;
  color:var(--muted);
  font-weight:800;
  font-size:12px;
  line-height:1.4;
}
@media(max-width:1100px){
  .layout{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="page">

<div class="header">
<div class="header-inner">
<div class="brand">
<img src="logo.png" alt="My Refund">
<div class="brand-text">
<strong id="staffNameLabel">Processing</strong>
<span>Daily Work Logger</span>
</div>
</div>
<div class="header-right">
<button class="top-action" id="topUpdateBtn" onclick="updateDay()">Update</button>
<button class="dashboard-btn" onclick="goHome()">← Dashboard</button>
<div class="clock" id="clock"></div>
</div>
</div>
</div>

<div class="tabs">
<button class="tab active" onclick="switchTab('work', this)">Work Log</button>
<button class="tab" onclick="switchTab('resources', this)">Resources</button>
</div>

<div class="wrap">
<div id="workTab">

<div id="recoveryContainer"></div>

<div style="margin-bottom:28px;">
<div style="font-size:24px;font-weight:900;color:var(--g0);">
Hello, <span id="helloName"></span>
</div>
<div style="margin-top:6px;font-size:13px;font-weight:800;color:var(--muted);">
<span id="todayDate"></span> • Division: Processing
</div>
</div>

<!-- REST OF YOUR ORIGINAL PROCESSING CONTENT UNCHANGED -->

</div>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbwCZTuvnbwTAfkDXMjbLzCR-YXkzcbQ-hujbrZW7Hib5iLhbVwfkJ1xmSfpu-YfRGTn/exec";
const TZ="Pacific/Auckland";
const DIVISION="Processing";

const name=localStorage.getItem("currentStaff")||"Processing";

const todayISO=new Date().toLocaleDateString("en-CA",{timeZone:TZ});
const yesterdayISO=new Date(Date.now()-86400000).toLocaleDateString("en-CA",{timeZone:TZ});

let workingDate=todayISO;

/* RECOVERY CHECK */
const recoveryContainer=document.getElementById("recoveryContainer");
const yesterdayKey=`processing_${name}_${yesterdayISO}`;
const yesterdayData=localStorage.getItem(yesterdayKey);

if(yesterdayData){
const parsed=JSON.parse(yesterdayData);
if(!parsed.submitted){
recoveryContainer.innerHTML=`
<div class="recovery-banner">
⚠ You have unsubmitted data from yesterday.<br>
<button class="continue" onclick="continueYesterday()">Continue Yesterday</button>
<button class="fresh" onclick="startFresh()">Start Fresh Today</button>
</div>
`;
}
}

window.continueYesterday=function(){
workingDate=yesterdayISO;
alert("You are now logging for yesterday. Submission and Update will use yesterday's date.");
recoveryContainer.innerHTML="";
};

window.startFresh=function(){
recoveryContainer.innerHTML="";
};

/* IMPORTANT: Change submit + update to use workingDate instead of todayISO */

/* Replace in submitDay() */
window.submitDay = async function(){
if(!confirm("Submit day? This cannot be edited.")) return;

const btn=document.getElementById("submitBtn");
btn.classList.add("loading");
btn.textContent="Submitting...";
document.querySelector(".page").classList.add("submitting");

const formData=new URLSearchParams();
formData.append("action","submitProcessing");
formData.append("date",workingDate);
formData.append("staff",name);
formData.append("division",DIVISION);

/* rest unchanged */
};

/* Replace in updateDay() */
window.updateDay = async function(){
const btn=document.getElementById("topUpdateBtn");
btn.classList.add("loading");
btn.textContent="Updating...";

const formData=new URLSearchParams();
formData.append("action","updateProcessing");
formData.append("date",workingDate);
formData.append("staff",name);
formData.append("division",DIVISION);

/* rest unchanged */
};

});
</script>

</body>
</html>
