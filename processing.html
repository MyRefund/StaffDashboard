<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Language" content="en">
<meta name="google" content="notranslate">
<title>My Refund — Processing Workspace</title>

<style>
:root{
  --g0:#094B35;
  --g2:#ECFDF5;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --radius:16px;
  --shadow:0 12px 32px rgba(0,0,0,.14);
}
*{box-sizing:border-box}
body{margin:0;font-family:"Okta Neue",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);}
.page{min-height:100vh;background:url("My Refund-Hero Images-02 (1).jpg") center/cover no-repeat;transition:.2s ease;}
.page.submitting{opacity:.7;}
.header{background:var(--g0);color:#fff;padding:14px 24px;}
.header-inner{max-width:1300px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;}
.brand{display:flex;align-items:center;gap:14px;}
.brand img{height:26px}
.brand-text strong{font-size:15px;font-weight:900}
.brand-text span{font-size:12px;opacity:.9;font-weight:700}
.header-right{display:flex;align-items:center;gap:12px;}
.dashboard-btn{border-radius:999px;padding:8px 16px;font-weight:900;font-size:13px;border:1px solid #fff;background:transparent;color:#fff;cursor:pointer;}
.clock{font-weight:900;font-size:14px}
.top-action{border-radius:999px;padding:8px 14px;font-weight:900;font-size:13px;border:1px solid #fff;background:#fff;color:var(--g0);cursor:pointer;position:relative;}
.top-action.loading{pointer-events:none;opacity:.95;}
.top-action.loading::after{content:"";position:absolute;right:12px;top:50%;width:14px;height:14px;margin-top:-7px;border:2px solid rgba(9,75,53,.25);border-top:2px solid var(--g0);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.tabs{background:#fff;padding:12px 24px;display:flex;gap:10px;border-bottom:1px solid var(--border);}
.tab{border-radius:999px;padding:8px 16px;font-weight:900;font-size:13px;border:1px solid var(--g0);background:#fff;color:var(--g0);cursor:pointer;}
.tab.active{background:var(--g0);color:#fff;}
.wrap{max-width:1300px;margin:0 auto;padding:36px 24px 60px;}
.layout{display:grid;grid-template-columns:1fr 260px;gap:24px;}
.panel{background:rgba(255,255,255,.96);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:20px;}
.panel h3{margin:0 0 14px 0;font-size:18px;font-weight:900;color:var(--g0);}
.fee-panel{border-top:6px solid var(--g0);}
.banner{background:#fff3cd;border-left:6px solid #f0ad4e;padding:12px 16px;margin-bottom:20px;font-weight:800;border-radius:12px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;}
.item{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px;}
.item label{display:block;font-weight:900;margin-bottom:8px;}
.controls{display:flex;align-items:center;gap:6px;}
.controls button{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:#fff;font-weight:900;cursor:pointer;}
.controls input{width:56px;text-align:center;border:1px solid var(--border);border-radius:8px;padding:6px;font-weight:900;}
.button-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:16px;}
.type-btn{border-radius:12px;padding:10px;font-weight:900;border:2px solid var(--g0);background:#fff;color:var(--g0);cursor:pointer;}
.type-btn.active{background:var(--g0);color:#fff;}
input[type="text"]{padding:10px;border-radius:10px;border:1px solid var(--border);font-weight:700;width:100%;}
.add-btn{margin-top:10px;padding:10px 16px;border:none;border-radius:12px;background:var(--g0);color:#fff;font-weight:900;cursor:pointer;}
table{width:100%;border-collapse:collapse;}
th,td{border-bottom:1px solid var(--border);padding:8px;font-size:13px;}
th{color:var(--muted);font-weight:900;text-align:left;}
td button{border:1px solid var(--border);background:#fff;border-radius:8px;padding:6px 8px;cursor:pointer;font-weight:900;}
.total-box{background:var(--g2);border-radius:12px;padding:14px;font-weight:900;font-size:18px;text-align:right;}
.submit button{width:100%;border-radius:14px;padding:14px;font-weight:900;font-size:15px;border:none;background:var(--g0);color:#fff;cursor:pointer;position:relative;}
.submit button.loading{pointer-events:none;opacity:.95;}
.submit button.loading::after{content:"";position:absolute;right:18px;top:50%;width:16px;height:16px;margin-top:-8px;border:2px solid rgba(255,255,255,.5);border-top:2px solid #fff;border-radius:50%;animation:spin .8s linear infinite;}
.collapsible-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-weight:900;}
.hidden{display:none;}
.inline-check{display:flex;align-items:center;gap:10px;margin-top:10px;padding:10px 12px;border:1px solid var(--border);border-radius:12px;background:#fff;}
.inline-check span{font-weight:900;color:var(--muted);font-size:13px;}
.helper{margin-top:10px;color:var(--muted);font-weight:800;font-size:12px;line-height:1.4;}
@media(max-width:1100px){.layout{grid-template-columns:1fr}}

/* ADDED: calculator button */
.calculator-btn{
  border-radius:999px;
  padding:8px 14px;
  font-weight:900;
  font-size:13px;
  border:1px solid #fff;
  background:transparent;
  color:#fff;
  cursor:pointer;
}

/* ADDED: calculator drawer */
.calculator-drawer{
  position:fixed;
  top:0;
  right:-100%;
  width:520px;
  height:100%;
  background:#fff;
  box-shadow:-10px 0 40px rgba(0,0,0,.2);
  z-index:9999;
  display:flex;
  flex-direction:column;
  transition:right 0.35s ease;
}
.calculator-drawer.open{right:0;}
.drawer-header{
  background:#094B35;
  color:#fff;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:900;
}
.drawer-header button{
  background:transparent;
  border:none;
  color:#fff;
  font-size:18px;
  cursor:pointer;
}
.drawer-iframe{
  width:100%;
  height:100%;
  border:none;
}
.drawer-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.3);
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:9998;
}
.drawer-overlay.show{
  opacity:1;
  pointer-events:auto;
}
</style>
</head>

<body>
<div class="page">

<div class="header">
<div class="header-inner">
<div class="brand">
<img src="logo.png" alt="My Refund">
<div class="brand-text">
<strong id="staffNameLabel">Processing</strong>
<span>Daily Work Logger</span>
</div>
</div>
<div class="header-right">
<button class="calculator-btn" onclick="toggleCalculator()">Calculator</button>
<button class="top-action" id="topUpdateBtn" onclick="updateDay()">Update</button>
<button class="dashboard-btn" onclick="goHome()">← Dashboard</button>
<div class="clock" id="clock"></div>
</div>
</div>
</div>

<div class="tabs">
<button class="tab active" onclick="switchTab('work', this)">Work Log</button>
<button class="tab" onclick="switchTab('resources', this)">Resources</button>
</div>

<div class="wrap">
<div id="workTab">
<div id="warningBanner" class="banner hidden"></div>

<div style="margin-bottom:28px;">
<div style="font-size:24px;font-weight:900;color:var(--g0);">
Hello, <span id="helloName"></span>
</div>
<div style="margin-top:6px;font-size:13px;font-weight:800;color:var(--muted);">
<span id="todayDate"></span> • Division: Processing
</div>
</div>

<div class="layout">
<div>

<div class="panel">
<h3>Processing Output</h3>
<div class="grid">
<div class="item"><label>Filing</label><div class="controls"><button onclick="adj('filing',-1)">−</button><input id="filing" value="0"><button onclick="adj('filing',1)">+</button></div></div>
<div class="item"><label>Linking</label><div class="controls"><button onclick="adj('linking',-1)">−</button><input id="linking" value="0"><button onclick="adj('linking',1)">+</button></div></div>
<div class="item"><label>Linked Review</label><div class="controls"><button onclick="adj('linkedreview',-1)">−</button><input id="linkedreview" value="0"><button onclick="adj('linkedreview',1)">+</button></div></div>
<div class="item"><label>Inbox</label><div class="controls"><button onclick="adj('inbox',-1)">−</button><input id="inbox" value="0"><button onclick="adj('inbox',1)">+</button></div></div>
<div class="item"><label>Existing Review</label><div class="controls"><button onclick="adj('existingreview',-1)">−</button><input id="existingreview" value="0"><button onclick="adj('existingreview',1)">+</button></div></div>
<div class="item"><label>Processing Review</label><div class="controls"><button onclick="adj('processingreview',-1)">−</button><input id="processingreview" value="0"><button onclick="adj('processingreview',1)">+</button></div></div>
<div class="item"><label>Miscellaneous</label><div class="controls"><button onclick="adj('misc',-1)">−</button><input id="misc" value="0"><button onclick="adj('misc',1)">+</button></div></div>
</div>
</div>

<div class="panel fee-panel">
<h3>Return Fee Logging</h3>
<div class="button-grid">
<button class="type-btn" onclick="selectType(event,'ITA')">ITA</button>
<button class="type-btn" onclick="selectType(event,'IR3')">IR3</button>
<button class="type-btn" onclick="selectType(event,'REB')">REB</button>
<button class="type-btn" onclick="autoAdd('ITATTP')">ITA TTP</button>
<button class="type-btn" onclick="autoAdd('IR3TTP')">IR3 TTP</button>
</div>

<div id="inputSection" class="hidden">
<input type="text" id="amountInput" placeholder="Refund Amount">
<label id="backYearLabel" class="hidden inline-check"><input type="checkbox" id="backYear"><span>Back Year</span></label>
<label id="receiptLabel" class="hidden inline-check"><input type="checkbox" id="receiptAssist"><span>Receipt Assistance</span></label>
<div class="helper" id="feeHelper" style="display:none;"></div>
<button class="add-btn" onclick="addEntry()">Add</button>
</div>
</div>

<div class="panel fee-panel">
<div class="collapsible-header" onclick="toggleLog()">
<span>Today’s Fee Entries (<span id="entryCount">0</span>)</span>
<span id="toggleIcon">▼</span>
</div>
<div id="logContainer" class="hidden">
<table>
<thead><tr><th>Time</th><th>Type</th><th>Fee</th><th></th></tr></thead>
<tbody id="logTable"></tbody>
</table>
</div>
</div>

<div class="panel fee-panel">
<div class="total-box">Total Fees Today: $<span id="totalFees">0.00</span></div>
</div>

<div class="submit">
<button id="submitBtn" onclick="submitDay()">Submit & Finish Day</button>
</div>

</div>

<div>
<div class="panel">
<h3>Quick Contacts</h3>
<strong>My Refund</strong><br>
0800 80 89 89<br>
info@myrefund.co.nz<br>
myrefund.co.nz<br><br>
<strong>IRD</strong><br>
ird.govt.nz<br>
0800 227 774
</div>
</div>

</div>
</div>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded",function(){

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbwCZTuvnbwTAfkDXMjbLzCR-YXkzcbQ-hujbrZW7Hib5iLhbVwfkJ1xmSfpu-YfRGTn/exec";
const TZ="Pacific/Auckland";
const DIVISION="Processing";
const name=localStorage.getItem("currentStaff")||"Processing";

function nzISO(d){return(d||new Date()).toLocaleDateString("en-CA",{timeZone:TZ});}
function nzHuman(iso){const[a,b,c]=iso.split("-").map(Number);return new Date(Date.UTC(a,b-1,c,12)).toLocaleDateString("en-NZ",{weekday:"long",day:"numeric",month:"long",year:"numeric",timeZone:TZ});}

const todayISO=nzISO(new Date());
const yesterdayISO=nzISO(new Date(Date.now()-86400000));
let workingISO=todayISO;

const todayKey=`processing_${name}_${todayISO}`;
const yesterdayKey=`processing_${name}_${yesterdayISO}`;
let storageKey=todayKey;

const savedYesterday=localStorage.getItem(yesterdayKey);
if(!localStorage.getItem(todayKey)&&savedYesterday){
const yState=JSON.parse(savedYesterday);
if(yState&&yState.submitted===false){workingISO=yesterdayISO;storageKey=yesterdayKey;}
}

document.getElementById("staffNameLabel").textContent=name;
document.getElementById("helloName").textContent=name;
document.getElementById("todayDate").textContent=workingISO===todayISO?nzHuman(todayISO):nzHuman(workingISO)+" (Carry-over)";

function tick(){clock.textContent=new Date().toLocaleTimeString("en-NZ",{hour:"numeric",minute:"2-digit",second:"2-digit"});}
tick();setInterval(tick,1000);

let entries=[];
let submitted=false;
let currentType=null;

function saveState(){
localStorage.setItem(storageKey,JSON.stringify({
entries,submitted,
counters:{
filing:filing.value,linking:linking.value,linkedreview:linkedreview.value,
inbox:inbox.value,existingreview:existingreview.value,
processingreview:processingreview.value,misc:misc.value
}}));
}

function loadState(){
const saved=localStorage.getItem(storageKey);
if(saved){
const state=JSON.parse(saved);
entries=state.entries||[];
submitted=state.submitted||false;
if(state.counters){Object.keys(state.counters).forEach(k=>{if(document.getElementById(k))document.getElementById(k).value=state.counters[k];});}
}
renderLog();updateTotal();
}
loadState();

window.adj=function(id,d){if(submitted)return;const el=document.getElementById(id);el.value=Math.max(0,Number(el.value||0)+d);saveState();};

function cleanAmount(v){return parseFloat(String(v||"").replace(/[$, ]/g,''))||0;}

function calculateFee(type,R,ra,by){
if(type==="ITA"){if(R<39.68)return R;let base=R*0.11+5;if(!by)base+=29.5;let f=base*1.15;return f>345?345:f;}
if(type==="IR3"){if(by){if(R<23)return R;let base=R*0.11+20;let f=base*1.15;return f>402.5?402.5:f;}
if(R<56.93)return R;let base=R*0.11+20+29.5;let f=base*1.15;return f>402.5?402.5:f;}
if(type==="REB"){let tier=R<500?45.99:(R<2000?68.99:91.99);if(ra)tier+=6.89;return R<tier?R:tier;}
return 0;
}

window.selectType=function(e,type){
if(submitted)return;
currentType=type;
document.querySelectorAll(".type-btn").forEach(b=>b.classList.remove("active"));
e.target.classList.add("active");
inputSection.classList.remove("hidden");
backYearLabel.classList.add("hidden");receiptLabel.classList.add("hidden");
if(type==="ITA"||type==="IR3")backYearLabel.classList.remove("hidden");
if(type==="REB")receiptLabel.classList.remove("hidden");
};

window.autoAdd=function(type){
if(submitted)return;
let fee=0;
if(type==="ITATTP")fee=(29.5+5)*1.15;
if(type==="IR3TTP")fee=(29.5+20)*1.15;
entries.push({type,amount:null,fee:Number(fee.toFixed(2)),receiptAssist:false,backYear:false,time:new Date().toLocaleTimeString("en-NZ",{hour:"numeric",minute:"2-digit"})});
renderLog();updateTotal();saveState();
};

window.addEntry=function(){
if(submitted||!currentType)return;
const R=cleanAmount(amountInput.value);if(!R)return;
const ra=receiptAssist.checked;const by=backYear.checked;
const fee=calculateFee(currentType,R,ra,by);
entries.push({type:currentType,amount:R,fee,receiptAssist:ra,backYear:by,time:new Date().toLocaleTimeString("en-NZ",{hour:"numeric",minute:"2-digit"})});
if(["ITA","IR3","REB"].includes(currentType))adj("filing",1);
amountInput.value="";renderLog();updateTotal();saveState();
};

function renderLog(){
logTable.innerHTML="";
entries.forEach((e,i)=>{
const typeLabel=
(e.type==="IR3"&&e.backYear)?"IR3 (Back Year)":
(e.type==="ITA"&&e.backYear)?"ITA (Back Year)":
(e.type==="ITATTP")?"ITA TTP":
(e.type==="IR3TTP")?"IR3 TTP":
e.type;
const extra=(e.type==="REB"&&e.receiptAssist)?" + RA":"";
const row=document.createElement("tr");
row.innerHTML=`<td>${e.time}</td><td>${typeLabel}${extra}</td><td>$${Number(e.fee).toFixed(2)}</td><td></td>`;
logTable.appendChild(row);
});
entryCount.textContent=entries.length;
}

function updateTotal(){
totalFees.textContent=entries.reduce((s,e)=>s+Number(e.fee||0),0).toFixed(2);
}

window.submitDay=async function(){
if(submitted)return;
if(!confirm("Submit day? This cannot be edited."))return;
const btn=document.getElementById("submitBtn");
btn.classList.add("loading");btn.textContent="Submitting...";
const fd=new URLSearchParams();
fd.append("action","submitProcessing");
fd.append("date",workingISO);
fd.append("staff",name);
fd.append("division",DIVISION);
fd.append("Filing",filing.value);
fd.append("Linking",linking.value);
fd.append("LinkedReview",linkedreview.value);
fd.append("Inbox",inbox.value);
fd.append("ExistingReview",existingreview.value);
fd.append("ProcessingReview",processingreview.value);
fd.append("Miscellaneous",misc.value);
fd.append("TotalFees",totalFees.textContent);
fd.append("feeEntries",JSON.stringify(entries));
await fetch(WEB_APP_URL,{method:"POST",mode:"no-cors",body:fd});
submitted=true;saveState();
btn.textContent="Submitted ✓";
setTimeout(()=>window.location.href="index.html",1500);
};

window.updateDay=async function(){
if(submitted)return;
const btn=document.getElementById("topUpdateBtn");
btn.classList.add("loading");btn.textContent="Updating...";
const fd=new URLSearchParams();
fd.append("action","updateProcessing");
fd.append("date",workingISO);
fd.append("staff",name);
fd.append("division",DIVISION);
fd.append("Filing",filing.value);
fd.append("Linking",linking.value);
fd.append("LinkedReview",linkedreview.value);
fd.append("Inbox",inbox.value);
fd.append("ExistingReview",existingreview.value);
fd.append("ProcessingReview",processingreview.value);
fd.append("Miscellaneous",misc.value);
fd.append("TotalFees",totalFees.textContent);
fd.append("feeEntries",JSON.stringify(entries));
fd.append("submitted","false");
await fetch(WEB_APP_URL,{method:"POST",mode:"no-cors",body:fd});
btn.classList.remove("loading");btn.textContent="Updated ✓";
setTimeout(()=>btn.textContent="Update",1200);
saveState();
};

});
</script>

<div id="calculatorDrawer" class="calculator-drawer">
  <div class="drawer-header">
    <strong>Fee Calculator</strong>
    <button onclick="toggleCalculator()">✕</button>
  </div>
  <iframe src="feecalc.html" class="drawer-iframe"></iframe>
</div>

<div id="drawerOverlay" class="drawer-overlay" onclick="toggleCalculator()"></div>

<script>
function toggleCalculator(){
  const drawer=document.getElementById("calculatorDrawer");
  const overlay=document.getElementById("drawerOverlay");
  drawer.classList.toggle("open");
  overlay.classList.toggle("show");
}
</script>

</body>
</html>
